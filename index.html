  <!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ANTI-RISK · Скрипты поддержки v2.1 (2 режима)</title>
  <style>
    :root{
      --navy:#0f1f3d;
      --blue:#1a3a6b;
      --accent:#2e7be4;
      --light:#e8f0fc;
      --red:#c0392b;
      --green:#1e7e4a;
      --gold:#f0a500;

      --bg:#f2f5fb;
      --text:#1a2540;
      --muted:#666;
      --border:#dde4f0;
      --card:#ffffff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .app{display:flex;height:100vh;overflow:hidden}
    .sidebar{
      width:240px;flex-shrink:0;background:var(--navy);color:#fff;
      display:flex;flex-direction:column;overflow:hidden
    }
    .sb-top{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.10)}
    .sb-title{font-size:13px;font-weight:900;letter-spacing:.06em}
    .sb-sub{font-size:11px;opacity:.55;margin-top:2px}
    .sb-nav{flex:1;padding:10px 8px;overflow:auto}
    .sb-btn{
      width:100%;display:flex;align-items:center;gap:10px;
      padding:10px 10px;border:0;border-radius:12px;
      background:transparent;color:rgba(255,255,255,.72);
      cursor:pointer;text-align:left;font:inherit;transition:.15s;
      margin-bottom:4px
    }
    .sb-btn:hover{background:rgba(255,255,255,.06);color:#fff}
    .sb-btn.active{background:var(--accent);color:#fff}
    .sb-ic{font-size:16px;line-height:1}
    .sb-l1{font-size:13px;line-height:1.2;font-weight:900}
    .sb-l2{font-size:10px;opacity:.75;margin-top:1px}
    .sb-bottom{padding:12px 14px;border-top:1px solid rgba(255,255,255,.10);font-size:10px;opacity:.55;line-height:1.5}

    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .header{
      background:#fff;border-bottom:1px solid #e0e8f0;padding:12px 14px;
      display:flex;align-items:center;gap:12px;flex-shrink:0
    }
    .h-icon{font-size:22px}
    .h-title{margin:0;font-size:18px;font-weight:900}
    .h-sub{font-size:12px;color:#888;margin-top:2px}
    .h-right{margin-left:auto;display:flex;align-items:center;gap:10px}

    .modeBox{
      display:flex;align-items:center;gap:6px;
      background:#f4f7ff;border:1.5px solid var(--border);
      border-radius:14px;padding:6px;
    }
    .modeBtn{
      border:0;border-radius:12px;padding:8px 10px;cursor:pointer;
      font:inherit;font-size:12px;transition:.15s;
      background:transparent;color:#445;white-space:nowrap
    }
    .modeBtn.active{
      background:var(--accent);color:#fff;font-weight:900
    }
    .modeHint{font-size:11px;color:#666}

    .content{flex:1;overflow:auto;padding:16px}

    .row{display:flex;gap:10px;align-items:center}
    .spacer{flex:1}
    .btn{
      border:0;border-radius:10px;padding:8px 12px;cursor:pointer;
      background:#f0f0f0;color:#555;font:inherit;font-size:13px
    }

    .pill{
      border:0;border-radius:999px;padding:7px 14px;cursor:pointer;
      background:#f0f4ff;color:#445;font:inherit;font-size:12px
    }
    .pill.active{background:var(--accent);color:#fff;font-weight:900}
    .input{
      width:100%;
      padding:10px 14px;
      border:1.5px solid var(--border);
      border-radius:12px;
      font-size:13px;
      font:inherit;
      outline:none
    }
    .hint{color:#888;font-size:12px;margin:10px 0}
    .secTitle{font-size:13px;color:#555;margin:0 0 14px;line-height:1.45}

    .card{
      background:var(--card);
      border:1.5px solid var(--border);
      border-radius:14px;
      margin-bottom:10px;
      overflow:hidden;
      transition:.15s
    }
    .card.open{border-color:var(--accent);background:#f0f6ff}
    .card-h{
      display:flex;align-items:center;gap:10px;
      padding:12px 14px;cursor:pointer;user-select:none
    }
    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:11px;color:#888;min-width:60px
    }
    .tag{
      font-size:10px;background:var(--accent);color:#fff;border-radius:8px;
      padding:3px 8px;white-space:nowrap
    }
    .card-title{font-size:14px;font-weight:900;flex:1}
    .toggle{color:var(--accent);font-size:16px}
    .card-b{display:none;padding:0 14px 14px}
    .card.open .card-b{display:block}
    .bubble{
      background:var(--light);
      border-radius:12px;
      padding:10px 14px;
      line-height:1.6;
      font-size:14px;
      color:#2a3450;
      margin:0 0 10px;
      white-space:pre-wrap
    }
    .copy{
      border:0;border-radius:10px;padding:7px 14px;cursor:pointer;font-size:12px;
      background:var(--accent);color:#fff;font:inherit;white-space:nowrap
    }
    .copy.ok{background:var(--green)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid1{display:grid;gap:10px}

    .formula{
      background:var(--light);border:2px solid var(--accent);
      border-radius:16px;padding:18px;text-align:center
    }
    .formulaSmall{font-size:13px;color:#666;margin-bottom:8px}
    .formulaBig{font-size:18px;font-weight:900;letter-spacing:.02em;color:var(--navy);line-height:1.25}

    .badgeNum{
      min-width:64px;text-align:center;border-radius:14px;padding:10px 20px;
      font-size:22px;font-weight:900;color:#fff;transition:.2s
    }
    .smallMuted{font-size:13px;color:#666}
    .rfItem{
      display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;
      background:#fafbff;border:1.5px solid var(--border);
      cursor:pointer;user-select:none;transition:.15s
    }
    .rfItem.active{background:#fff0f0;border-color:var(--red)}
    .box{
      width:22px;height:22px;border-radius:7px;border:2px solid #bbb;background:#fff;
      display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0
    }
    .rfItem.active .box{background:var(--red);border-color:var(--red)}
    .rfText{font-size:14px;color:#2a3450}
    .rfItem.active .rfText{color:var(--red);font-weight:900}

    .pbRow{
      display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;
      background:#f4f7ff;border:1.5px solid var(--border);
      cursor:pointer;user-select:none;transition:.15s
    }
    .pbRow.open{background:var(--blue);border-color:var(--blue)}
    .pbNum{
      width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-weight:900;flex-shrink:0;background:#e0e8ff;color:var(--accent)
    }
    .pbRow.open .pbNum{background:var(--accent);color:#fff}
    .pbName{font-size:14px;font-weight:900}
    .pbSub{font-size:12px;opacity:.8}
    .pbRow.open .pbName,.pbRow.open .pbSub{color:#fff}
    .pbBody{
      border:1.5px solid var(--blue);border-top:0;border-radius:0 0 14px 14px;
      background:#f8fbff;padding:16px;margin-top:-6px
    }
    .cap{
      font-size:12px;font-weight:900;color:var(--accent);
      text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px
    }
    ul{margin:0;padding-left:18px}
    li{margin:0 0 4px;color:#2a3450;line-height:1.5;font-size:13px}

    .warn{
      background:#fff0f0;border:1.5px solid var(--red);
      border-radius:14px;padding:12px 16px;margin-bottom:14px
    }
    .warnTitle{font-weight:900;color:var(--red);margin-bottom:4px;font-size:14px}
    .warnText{font-size:13px;color:#555;line-height:1.5}

    .split{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #eee}
    .colBad{background:#fff5f5;padding:12px 14px;border-right:1.5px solid var(--border)}
    .colGood{background:#f0fff5;padding:12px 14px}
    .miniCapBad{font-size:11px;font-weight:900;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .miniCapGood{font-size:11px;font-weight:900;color:var(--green);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .badLine{color:var(--red);font-weight:900;margin-bottom:3px;font-size:13px}
    .goodLine{color:#1a3d25;font-size:13px;line-height:1.5}
    .footCopy{display:flex;justify-content:flex-end;padding:10px 14px}

    .topbarMobile{display:none;position:fixed;left:0;right:0;top:0;z-index:20;background:#fff;border-bottom:1px solid #e0e8f0;padding:10px 12px;align-items:center;gap:10px}
    .hamb{border:0;border-radius:12px;background:var(--navy);color:#fff;padding:8px 10px;cursor:pointer}
    .mobileTitle{font-weight:900;color:var(--navy)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:25}
    .sidebar.mobile{position:fixed;left:0;top:0;bottom:0;z-index:30;transform:translateX(-110%);transition:.2s}
    .sidebar.mobile.open{transform:translateX(0)}
    @media (max-width: 860px){
      .app{padding-top:54px}
      .topbarMobile{display:flex}
      #sidebarDesktop{display:none}
      .sidebar.mobile{display:flex;width:270px}
      .overlay.show{display:block}
      .content{padding:14px}
      .grid2{grid-template-columns:1fr}
      .mono{min-width:52px}
    }
  </style>
</head>
<body>

<div class="topbarMobile">
  <button class="hamb" id="btnMenu">☰</button>
  <div>
    <div class="mobileTitle">ANTI-RISK · Скрипты поддержки</div>
    <div class="h-sub" id="mobileSub">v2.1</div>
  </div>
</div>
<div class="overlay" id="overlay"></div>

<div class="app">
  <aside class="sidebar mobile" id="sidebarMobile">
    <div class="sb-top">
      <div class="sb-title">ANTI-RISK</div>
      <div class="sb-sub">Скрипты поддержки v2.1</div>
    </div>
    <nav class="sb-nav" id="navMobile"></nav>
    <div class="sb-bottom">
      Режим ответа:<br>
      Мягко / Жёстко
    </div>
  </aside>

  <aside class="sidebar" id="sidebarDesktop">
    <div class="sb-top">
      <div class="sb-title">ANTI-RISK</div>
      <div class="sb-sub">Скрипты поддержки v2.1</div>
    </div>
    <nav class="sb-nav" id="navDesktop"></nav>
    <div class="sb-bottom">
      Режим ответа:<br>
      Мягко / Жёстко
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <div class="h-icon" id="hIcon">🚩</div>
      <div>
        <h1 class="h-title" id="hTitle">Флаги риска</h1>
        <div class="h-sub" id="hSub">Детектор риска</div>
      </div>

      <div class="h-right">
        <div>
          <div class="modeHint">Режим ответа</div>
          <div class="modeBox">
            <button class="modeBtn active" id="modeSoft">Мягко</button>
            <button class="modeBtn" id="modeHard">Жёстко</button>
          </div>
        </div>
      </div>
    </div>

    <div class="content" id="content"></div>
  </main>
</div>

<script>
  const ACCENT = "#2e7be4";
  const LIGHT  = "#e8f0fc";
  const RED_C  = "#c0392b";
  const GREEN_C= "#1e7e4a";
  const GOLD   = "#f0a500";

  let MODE = "soft"; // soft | hard

  function pick(obj){
    if(!obj) return "";
    if(typeof obj === "string") return obj;
    return MODE === "hard" ? (obj.hard || obj.soft || "") : (obj.soft || obj.hard || "");
  }

  const RED_FLAGS = [
    "Клиент требует деньги «немедленно / срочно»",
    "«Мошенники / жульё / обманули»",
    "Угрозы «Роспотребнадзор / прокуратура / суд»",
    "Угрозы «везде напишу / негативные отзывы / сторис»",
    "«Чарджбэк / диспут / банк»",
    "Повторные сообщения «игнорируете / не отвечаете»",
    "Раздражение: «почему одно и то же?»",
    "Возвраты / компенсации / деньги",
    "«Доставлено, но не получил(а)»",
    "Публичный отзыв / комментарий",
    "Требования вне обычного решения (вне регламента)"
  ];

  const TRIGGERS = [
    { code:"T01", trigger:"«Верните деньги (срочно/немедленно)»",
      reply:{ soft:"Понимаю. Проверю статус по {ЗАКАЗ} и зафиксирую следующий шаг. Вернусь до {ВРЕМЯ}.",
             hard:"Принято. Проверяю {ЗАКАЗ}. Следующий шаг и апдейт — до {ВРЕМЯ}." },
      req:"Запрос: {ЗАКАЗ} (если не дали)." },

    { code:"T02", trigger:"«Деньги не пришли / где возврат»",
      reply:{ soft:"Поняла. Проверю статус операции с нашей стороны по {ЗАКАЗ} и вернусь с подтверждением до {ВРЕМЯ}.",
             hard:"Проверяю операцию по {ЗАКАЗ}. Подтверждение и срок — до {ВРЕМЯ}." },
      req:"Запрос: {ЗАКАЗ}." },

    { code:"T03", trigger:"«Вы мошенники / обманули / жульё»",
      reply:{ soft:"Понимаю эмоции. Давайте разберёмся по фактам по {ЗАКАЗ}. Вернусь до {ВРЕМЯ}.",
             hard:"Фиксирую кейс {ЗАКАЗ}. Проверка по фактам. Апдейт — до {ВРЕМЯ}." },
      req:"Запрос: {ЗАКАЗ} + 1 уточнение." },

    { code:"T04", trigger:"«Сейчас напишу в Роспотребнадзор»",
      reply:{ soft:"Вы вправе обращаться, куда считаете нужным. Я хочу решить вопрос максимально быстро: проверю {ЗАКАЗ} и вернусь до {ВРЕМЯ}.",
             hard:"Принято. Проверяю {ЗАКАЗ}. Решение/шаг — до {ВРЕМЯ}." },
      req:"Запрос: {ЗАКАЗ}." },

    { code:"T05", trigger:"«Пойду в суд / прокуратуру»",
      reply:{ soft:"Вы вправе обращаться. Со своей стороны: проверю {ЗАКАЗ} и вернусь с конкретным шагом до {ВРЕМЯ}.",
             hard:"Принято. Проверяю {ЗАКАЗ}. Конкретный шаг — до {ВРЕМЯ}." },
      req:"Запрос: {ЗАКАЗ} + что хотите: возврат/обмен/доставка." },

    { code:"T06", trigger:"«Оставлю отзывы / везде напишу»",
      reply:{ soft:"Понимаю. Я хочу, чтобы вопрос решился быстро: проверю {ЗАКАЗ} и вернусь с конкретным шагом до {ВРЕМЯ}.",
             hard:"Фиксирую. Проверяю {ЗАКАЗ}. Конкретный шаг — до {ВРЕМЯ}." },
      req:"Запрос: {ЗАКАЗ}." },

    { code:"T07", trigger:"«Сделаю чарджбэк / диспут»",
      reply:{ soft:"Понимаю. Я хочу закрыть вопрос напрямую: проверю {ЗАКАЗ} и вернусь с решением до {ВРЕМЯ}.",
             hard:"Фиксирую. Проверяю {ЗАКАЗ}. Решение — до {ВРЕМЯ}." },
      req:"Запрос: {ЗАКАЗ}." },

    { code:"T08", trigger:"«Доставлено, но я не получил(а)»",
      reply:{ soft:"Понимаю. Проверю детали вручения по {ЗАКАЗ}/{ТРЕК} и вернусь до {ВРЕМЯ}.",
             hard:"Проверяю вручение {ЗАКАЗ}/{ТРЕК}. Апдейт — до {ВРЕМЯ}." },
      req:"Запрос: {ТРЕК} или {ЗАКАЗ} + кто мог принять." },

    { code:"T09", trigger:"«Трек не работает»",
      reply:{ soft:"Уточняю статус по {ТРЕК}. Подскажите город {ГОРОД} — это ускорит проверку. Вернусь до {ВРЕМЯ}.",
             hard:"Нужен город {ГОРОД}. Уточняю {ТРЕК}. Апдейт — до {ВРЕМЯ}." },
      req:"" },

    { code:"T10", trigger:"«Сколько ещё ждать?»",
      reply:{ soft:"Уточняю статус по {ЗАКАЗ}. Вернусь с точной датой или вариантом решения до {ВРЕМЯ}.",
             hard:"Уточняю {ЗАКАЗ}. Дата/вариант — до {ВРЕМЯ}." },
      req:"" },

    { code:"T11", trigger:"«Вы игнорируете / не отвечаете»",
      reply:{ soft:"Спасибо, что написали. Беру обращение по {ЗАКАЗ} в работу и вернусь с обновлением до {ВРЕМЯ}.",
             hard:"Принято. Беру {ЗАКАЗ} в работу. Апдейт — до {ВРЕМЯ}." },
      req:"" },

    { code:"T12", trigger:"«Зачем снова спрашиваете одно и то же?»",
      reply:{ soft:"Спасибо, что сказали. Я уже вижу: {ФАКТЫ}. Уточню один момент: {ВОПРОС} — и дальше двигаюсь без повторов. Апдейт до {ВРЕМЯ}.",
             hard:"Факты вижу: {ФАКТЫ}. Нужен один момент: {ВОПРОС}. Апдейт — до {ВРЕМЯ}." },
      req:"" },

    { code:"T13", trigger:"«Хочу компенсацию / скидку / бесплатную доставку»",
      reply:{ soft:"Понимаю. Проверю ситуацию по {ЗАКАЗ} и вернусь с вариантами до {ВРЕМЯ}.",
             hard:"Принято. Проверяю {ЗАКАЗ}. Возможные варианты — до {ВРЕМЯ}." },
      req:"Запрос: {ЗАКАЗ} + что считаете приемлемым." },

    { code:"T14", trigger:"«Верните деньги и товар оставьте»",
      reply:{ soft:"Поняла. Проверю условия по {ЗАКАЗ} и вернусь с тем, что возможно, до {ВРЕМЯ}.",
             hard:"Проверяю условия по {ЗАКАЗ}. Что возможно — до {ВРЕМЯ}." },
      req:"" },

    { code:"T15", trigger:"«Я не согласен(а) с решением»",
      reply:{ soft:"Понимаю. Уточните, что именно неприемлемо (1 фраза). Проверю варианты и вернусь до {ВРЕМЯ}.",
             hard:"Напишите, что неприемлемо (1 фраза). Проверю варианты. Апдейт — до {ВРЕМЯ}." },
      req:"" }
  ];

  const PLAYBOOKS = [
    { num:1, name:"Задержка возврата",
      when:"«верните деньги», «денег нет», угрозы жалоб/суда, повторные обращения.",
      first:{ soft:"Понимаю. Проверю статус возврата по {ЗАКАЗ} и вернусь с подтверждением и следующим шагом до {ВРЕМЯ}.",
              hard:"Проверяю возврат по {ЗАКАЗ}. Подтверждение/шаг — до {ВРЕМЯ}." },
      facts:["{ЗАКАЗ}","{СУММА} (если есть)","Дата запроса возврата {ДАТА}"],
      solutions:["Проверка статуса операции с нашей стороны.","Подтверждение статуса/документа (если применимо).","Чёткий следующий шаг."],
      close:{ soft:"Зафиксировала: {РЕШЕНИЕ}. Следующий шаг: {ШАГ}. Апдейт до {ВРЕМЯ}.",
              hard:"Фиксирую: {РЕШЕНИЕ}. Шаг: {ШАГ}. Апдейт — до {ВРЕМЯ}." }
    },
    { num:2, name:"Срыв/потеря доставки",
      when:"«где заказ», «сорвалась доставка», «неделю тянете», угрозы отзывами.",
      first:{ soft:"Понимаю. Проверю статус доставки по {ЗАКАЗ}/{ТРЕК} и вернусь с планом действий до {ВРЕМЯ}.",
              hard:"Проверяю доставку {ЗАКАЗ}/{ТРЕК}. План действий — до {ВРЕМЯ}." },
      facts:["{ЗАКАЗ}/{ТРЕК}","Город {ГОРОД}","Контакт {ТЕЛ}","Дата последнего статуса {ДАТА}"],
      solutions:["Уточнение статуса/розыск.","Перенос/повторная доставка (если возможно).","Вариант отмены/альтернативы (если применимо)."],
      close:{ soft:"Зафиксировала план: {ШАГ}. Следующий апдейт до {ВРЕМЯ}.",
              hard:"План: {ШАГ}. Апдейт — до {ВРЕМЯ}." }
    },

  function el(tag, attrs={}, children=[]){
    const n = document.createElement(tag);
    Object.keys(attrs).forEach(k=>{
      if(k==="class") n.className = attrs[k];
      else if(k==="html") n.innerHTML = attrs[k];
      else if(k.startsWith("on") && typeof attrs[k]==="function") n.addEventListener(k.slice(2), attrs[k]);
      else if(k==="style") n.setAttribute("style", attrs[k]);
      else n.setAttribute(k, attrs[k]);
    });
    (Array.isArray(children)?children:[children]).forEach(ch=>{
      if(ch===null || ch===undefined) return;
      if(typeof ch==="string") n.appendChild(document.createTextNode(ch));
      else n.appendChild(ch);
    });
    return n;
  }

  function fallbackCopy(text){
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position="fixed";
    ta.style.left="-9999px";
    ta.style.top="-9999px";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
  }

  function copyText(text, btn){
    const done = ()=> {
      btn.classList.add("ok");
      btn.textContent = "✓ Скопировано";
      setTimeout(()=>{ btn.classList.remove("ok"); btn.textContent="Копировать"; }, 1600);
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{ fallbackCopy(text); done(); });
    }else{ fallbackCopy(text); done(); }
  }

  function replyCard({id, tag, label, text, tagColor}){
    const shown = pick(text);
    const card = el("div",{class:"card"});
    const header = el("div",{class:"card-h"});
    if(id) header.appendChild(el("span",{class:"mono"}, id));
    if(tag) header.appendChild(el("span",{class:"tag", style: tagColor ? ("background:"+tagColor) : ""}, tag));
    header.appendChild(el("div",{class:"card-title"}, label));
    const tg = el("div",{class:"toggle"}, "▼");
    header.appendChild(tg);

    const body = el("div",{class:"card-b"});
    const p = el("p",{class:"bubble"}, shown);
    const b = el("button",{class:"copy"}, "Копировать");
    b.addEventListener("click", (e)=>{ e.stopPropagation(); copyText(shown,b); });

    body.appendChild(p);
    body.appendChild(b);

    header.addEventListener("click", ()=>{
      const open = card.classList.toggle("open");
      tg.textContent = open ? "▲" : "▼";
    });

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }

  function renderFlags(){
    const root = el("div");
    const checked = new Set();

    const num = el("div",{class:"badgeNum"}, "0");
    const title = el("div",{style:"font-size:16px;font-weight:900"}, "Обычный режим");
    const sub = el("div",{class:"smallMuted"}, "Правило: ≥2 красных флага = включай протокол");
    const reset = el("button",{class:"btn"}, "Сбросить");

    function recalc(){
      const c = checked.size;
      num.textContent = String(c);
      if(c>=2){
        num.style.background = RED_C;
        title.style.color = RED_C;
        title.textContent = "⚠️ ВЫСОКИЙ РИСК — включай протокол!";
      }else if(c===1){
        num.style.background = GOLD;
        title.style.color = GOLD;
        title.textContent = "Наблюдай за ситуацией";
      }else{
        num.style.background = GREEN_C;
        title.style.color = "#1a2540";
        title.textContent = "Обычный режим";
      }
    }

    const list = el("div",{class:"grid1"});
    RED_FLAGS.forEach((txt, i)=>{
      const item = el("div",{class:"rfItem"});
      const box = el("div",{class:"box"},"");
      const t = el("div",{class:"rfText"}, txt);
      item.appendChild(box);
      item.appendChild(t);
      item.addEventListener("click", ()=>{
        if(checked.has(i)){
          checked.delete(i);
          item.classList.remove("active");
          box.textContent="";
        }else{
          checked.add(i);
          item.classList.add("active");
          box.textContent="✓";
        }
        recalc();
      });
      list.appendChild(item);
    });

    reset.addEventListener("click", ()=>{
      checked.clear();
      list.querySelectorAll(".rfItem").forEach(x=>x.classList.remove("active"));
      list.querySelectorAll(".box").forEach(x=>x.textContent="");
      recalc();
    });

    const top = el("div",{class:"row", style:"margin-bottom:18px"});
    top.appendChild(num);
    const mid = el("div");
    mid.appendChild(title);
    mid.appendChild(sub);
    top.appendChild(mid);
    top.appendChild(el("div",{class:"spacer"}));
    top.appendChild(reset);

    recalc();
    root.appendChild(top);
    root.appendChild(list);
    return root;
  }

        if(open){
          row.classList.add("open");
          arrow.textContent="▲";
          arrow.style.color="#fff";
          body.style.display="block";
        }else{
          row.classList.remove("open");
          arrow.textContent="▼";
          arrow.style.color=ACCENT;
          body.style.display="none";
        }
      }

      row.addEventListener("click", ()=>{
        active = (active===pb.num) ? null : pb.num;
        document.querySelectorAll("[data-pb]").forEach(n=>n._setOpen(Number(n.getAttribute("data-pb"))===active));
      });

      box.setAttribute("data-pb", pb.num);
      box._setOpen = setOpen;
      box.appendChild(row);
      box.appendChild(body);
      root.appendChild(box);
    });

    return root;
  }

  function renderQuick(items, tags){
    const root = el("div");
    let tag = "все";
    let q = "";

    const pills = el("div",{style:"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"});
    const input = el("input",{class:"input", placeholder:"Поиск по теме или тексту…"});
    const meta = el("div",{class:"hint"},"Найдено: 0");
    const list = el("div");

    function rebuild(){
      const qq = q.trim().toLowerCase();
      const filtered = items.filter(r=>{
        const okTag = (tag==="все" || r.tag===tag);
        const okQ = (!qq || (r.label||"").toLowerCase().includes(qq) || pick(r.text).toLowerCase().includes(qq));
        return okTag && okQ;
      });
      meta.textContent = "Найдено: " + filtered.length;
      list.innerHTML = "";
      filtered.forEach(r=>list.appendChild(replyCard({id:r.id, tag:r.tag, label:r.label, text:r.text})));
    }

    tags.forEach(t=>{
      const b = el("button",{class:"pill"+(t==="все"?" active":"" )}, t);
      b.addEventListener("click", ()=>{
        tag = t;
        pills.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
        rebuild();
      });
      pills.appendChild(b);
    });

    input.addEventListener("input", e=>{ q = e.target.value; rebuild(); });

    root.appendChild(pills);
    root.appendChild(input);
    root.appendChild(meta);
    root.appendChild(list);
    rebuild();
    return root;
  }

  function renderReviews(){
    const root = el("div");
    root.appendChild(el("p",{class:"secTitle"},"Ответы для публичных отзывов: без споров и без признания вины. Режим «Мягко/Жёстко» меняет текст."));
    REVIEWS.forEach(r=>{
      root.appendChild(replyCard({id:r.id, label:r.label, text:r.text}));
    });
    return root;
  }

  function renderForbidden(){
    const root = el("div");
    const blocks = ["все","А: вина","Б: обещания","В: ответственность","Г: сроки"];
    let block = "все";
    let q = "";

    root.appendChild(el("div",{class:"warn"},[
      el("div",{class:"warnTitle"},"Полный список — 24 опасные фразы с безопасными заменами"),
      el("div",{class:"warnText"},"Перед отправкой: нет ли в тексте фраз ниже? Если есть — замени на безопасный вариант.")
    ]));

    const pills = el("div",{style:"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"});
    blocks.forEach(b=>{
      const btn = el("button",{class:"pill", style:"background:#fff0f0;color:"+RED_C+";border:1px solid "+RED_C}, b);
      if(b===block){ btn.style.background = RED_C; btn.style.color="#fff"; btn.style.fontWeight="900"; }
      btn.addEventListener("click", ()=>{
        block = b;
        pills.querySelectorAll("button").forEach(x=>{
          x.style.background="#fff0f0"; x.style.color=RED_C; x.style.fontWeight="700";
        });
        btn.style.background=RED_C; btn.style.color="#fff"; btn.style.fontWeight="900";
        rebuild();
      });
      pills.appendChild(btn);
    });

    const input = el("input",{class:"input", placeholder:"Поиск по запрещённым фразам…"});
    const list = el("div");

    function rebuild(){
      const qq = q.trim().toLowerCase();
      const filtered = FW.filter(f=>{
        const okB = (block==="все" || f.block===block);
        const okQ = (!qq || (f.bad||[]).some(x=>String(x).toLowerCase().includes(qq)));
        return okB && okQ;
      });

      list.innerHTML = "";
      filtered.forEach(f=>{
        const box = el("div",{class:"card"});
        const head = el("div",{class:"card-h"});
        head.appendChild(el("span",{class:"mono"}, f.id));
        head.appendChild(el("div",{class:"card-title"}, f.block));
        head.appendChild(el("div",{class:"toggle"}, "▼"));
        const body = el("div",{class:"card-b"});

        const split = el("div",{class:"split"});
        const bad = el("div",{class:"colBad"});
        bad.appendChild(el("div",{class:"miniCapBad"},"❌ Нельзя"));
        (f.bad||[]).forEach(x=>bad.appendChild(el("div",{class:"badLine"}, "«"+x+"»")));
        const good = el("div",{class:"colGood"});
        good.appendChild(el("div",{class:"miniCapGood"},"✔ Безопасно"));
        const shown = pick(f.good);
        good.appendChild(el("div",{class:"goodLine"}, shown));

        split.appendChild(bad);
        split.appendChild(good);
        body.appendChild(split);

        const foot = el("div",{class:"footCopy"});
        const c = el("button",{class:"copy"},"Копировать");
        c.addEventListener("click", (e)=>{ e.stopPropagation(); copyText(shown, c); });
        foot.appendChild(c);
        body.appendChild(foot);

        head.addEventListener("click", ()=>{
          const open = box.classList.toggle("open");
          head.querySelector(".toggle").textContent = open ? "▲" : "▼";
        });

        box.appendChild(head);
        box.appendChild(body);
        list.appendChild(box);
      });
    }

    input.addEventListener("input", e=>{ q = e.target.value; rebuild(); });

    root.appendChild(pills);
    root.appendChild(input);
    root.appendChild(list);
    rebuild();
    return root;
  }

  let current = "flags";

  function setHeader(){
    const s = SECTIONS.find(x=>x.id===current) || SECTIONS[0];
    document.getElementById("hIcon").textContent = s.icon;
    document.getElementById("hTitle").textContent = s.label;
    document.getElementById("hSub").textContent = s.short;
    document.getElementById("mobileSub").textContent = s.label + " · " + s.short;
  }

  function render(){
    setHeader();
    const c = document.getElementById("content");
    c.innerHTML = "";

    if(current==="flags") c.appendChild(renderFlags());
    else if(current==="training") c.appendChild(renderTraining());
    else if(current==="triggers") c.appendChild(renderTriggers());
    else if(current==="playbooks") c.appendChild(renderPlaybooks());
    else if(current==="core50") c.appendChild(renderQuick(CORE50, CORE_TAGS));
    else if(current==="ext30") c.appendChild(renderQuick(EXT30, EXT_TAGS));
    else if(current==="reviews") c.appendChild(renderReviews());
    else if(current==="forbidden") c.appendChild(renderForbidden());
  }

  function buildNav(container){
    container.innerHTML = "";
    SECTIONS.forEach(s=>{
      const btn = el("button",{class:"sb-btn"+(s.id===current?" active":"" )});
      btn.appendChild(el("span",{class:"sb-ic"}, s.icon));
      const t = el("div");
      t.appendChild(el("div",{class:"sb-l1"}, s.label));
      t.appendChild(el("div",{class:"sb-l2"}, s.short));
      btn.appendChild(t);

      btn.addEventListener("click", ()=>{
        current = s.id;
        document.querySelectorAll(".sb-btn").forEach(x=>x.classList.remove("active"));
        document.querySelectorAll('[data-nav="'+s.id+'"]').forEach(x=>x.classList.add("active"));
        render();
        closeMobileMenu();
      });

      btn.setAttribute("data-nav", s.id);
      container.appendChild(btn);
    });
  }

  buildNav(document.getElementById("navDesktop"));
  buildNav(document.getElementById("navMobile"));
  render();

  const modeSoft = document.getElementById("modeSoft");
  const modeHard = document.getElementById("modeHard");

  function setMode(next){
    MODE = next;
    modeSoft.classList.toggle("active", MODE==="soft");
    modeHard.classList.toggle("active", MODE==="hard");
    render();
  }
  modeSoft.addEventListener("click", ()=>setMode("soft"));
  modeHard.addEventListener("click", ()=>setMode("hard"));

  const btnMenu = document.getElementById("btnMenu");
  const overlay = document.getElementById("overlay");
  const sbM = document.getElementById("sidebarMobile");

  function openMobileMenu(){
    overlay.classList.add("show");
    sbM.classList.add("open");
  }
  function closeMobileMenu(){
    overlay.classList.remove("show");
    sbM.classList.remove("open");
  }
  btnMenu.addEventListener("click", ()=>openMobileMenu());
  overlay.addEventListener("click", ()=>closeMobileMenu());
</script>
